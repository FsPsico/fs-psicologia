# Configuração de build da Netlify.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Fixa a versão do Node para builds reproduzíveis.
  NODE_VERSION = "22"

# Cabeçalhos de segurança e cache.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Os arquivos com hash (CSS/JS gerados pelo Astro) podem ser cacheados por muito tempo.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
